<!DOCTYPE html>
<html>
<head>
    <title>Global Admin Settings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f4f4; padding: 20px; }
        .settings-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-save { background: #000; color: #fbbc04; width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .back-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #333; font-weight: bold; }
        .flash-msg { padding: 10px; border-radius: 4px; margin-bottom: 20px; }
        .flash-success { background: #e8f5e9; color: #2e7d32; }
        .flash-error { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>
    <div class="settings-container">
        <a href="/admin" class="back-link">&larr; Back to Roster</a>
        <h2>Global Admin Security Settings</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-msg {{ 'flash-success' if 'successfully' in message or 'updated' in message else 'flash-error' }}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Current Admin Password:</label>
                <input type="password" name="current_password" required>
            </div>
            <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
            <div class="form-group">
                <label>New Admin Password:</label>
                <input type="password" name="new_password" required>
            </div>
            <div class="form-group">
                <label>Confirm New Password:</label>
                <input type="password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn-save">Update Admin Credentials</button>
        </form>
    </div>
</body>
</html>
