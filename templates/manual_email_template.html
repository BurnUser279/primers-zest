<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Inter', sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #eee; border-radius: 12px; }
        .header { border-bottom: 2px solid #fbbc04; padding-bottom: 10px; margin-bottom: 20px; }
        .footer { margin-top: 30px; padding-top: 10px; border-top: 1px solid #eee; font-size: 0.9rem; color: #666; }
        .signature { font-weight: bold; color: #000; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Administrative Dispatch</h2>
        </div>
        <p>Hello {{ name }},</p>
        <div class="main-body">
            {{ custom_message|safe }}
        </div>
        <div class="footer">
            <p>This message was dispatched by the Primer's Zest Administrative Team.</p>
            <p class="signature">Best Regards,<br>Administration</p>
        </div>
    </div>
</body>
</html>
