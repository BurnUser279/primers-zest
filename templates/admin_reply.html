<!DOCTYPE html>
<html>
<head>
    <title>Admin Reply</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        textarea { width: 100%; padding: 8px; margin-top: 10px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 10px 15px; width: 100%; background: #4CAF50; color: white; border: none; font-size: 16px; cursor: pointer; border-radius: 4px; }
        @media screen and (max-width: 768px) {
            body { padding: 10px; }
            button, textarea { padding: 15px; font-size: 16px; width: 100%; box-sizing: border-box; display: block; margin-top: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Reply to Member (ID: {{ member_id }})</h2>
        <form method="POST">
            <label><strong>Your Reply:</strong></label>
            <textarea name="admin_reply_text" rows="5" required></textarea>
            <button type="submit">Send Reply</button>
        </form>
        <br>
        <a href="/admin" style="display: block; text-align: center; color: #333; text-decoration: none;">Cancel & Return to Dashboard</a>
    </div>
</body>
</html>
