{% extends "layout.html" %}

{% block title %}Admin Login - Primer's Zest{% endblock %}

{% block extra_head %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 100px);
        padding: 40px 20px;
    }
    .login-card {
        background: var(--bg-card);
        padding: 45px;
        border-radius: 24px;
        box-shadow: var(--shadow-lg);
        width: 100%;
        max-width: 450px;
        border: 1px solid var(--border-color);
        position: relative;
        overflow: hidden;
    }
    .login-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 4px;
        background: var(--primary-gradient);
    }
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 25px;
    }
    label {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1.5px;
    }
    input {
        background: var(--bg-body);
        border: 1px solid var(--border-color);
        padding: 14px 18px;
        border-radius: 12px;
        color: var(--text-main);
        font-family: inherit;
        font-size: 1rem;
        transition: all 0.3s ease;
    }
    input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
    }
    .pass-container {
        position: relative;
    }
    .pass-toggle {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        opacity: 0.6;
        transition: 0.3s;
    }
    .pass-toggle:hover { opacity: 1; }

    @media (max-width: 480px) {
        .login-card { padding: 35px 25px; }
    }
</style>
{% endblock %}

{% block sidebar %}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="login-card reveal-stagger">
        <div style="text-align: center; margin-bottom: 40px;">
            <div style="display: inline-flex; align-items: center; justify-content: center; width: 60px; height: 60px; background: rgba(212, 175, 55, 0.1); border-radius: 50%; margin-bottom: 20px;">
                <svg width="28" height="28" fill="none" stroke="var(--primary)" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 10px;">Executive Vault</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Administrative Access Only</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label>Master Access Password</label>
                <div class="pass-container">
                    <input type="password" name="password" id="admin-password" required placeholder="••••••••" style="width: 100%;">
                    <span class="pass-toggle" onclick="togglePasswordVisibility('admin-password', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;">
                Unlock Portal
            </button>
        </form>

        <div style="margin-top: 30px; text-align: center;">
            <a href="/" style="color: var(--text-muted); font-size: 0.85rem; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 8px;">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5m7 7l-7-7 7-7"></path></svg>
                Return to Landing
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    window.togglePasswordVisibility = function(inputId, iconSpan) {
        const input = document.getElementById(inputId);
        const svg = iconSpan.querySelector('svg');
        if (input.type === 'password') {
            input.type = 'text';
            svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        } else {
            input.type = 'password';
            svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        }
    };
</script>
{% endblock %}
