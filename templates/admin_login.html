<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Secure Vault</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(251,188,4,0.1); width: 100%; max-width: 400px; box-sizing: border-box; border: 2px solid #fbbc04; }
        h2 { margin-top: 0; color: #1a1a1a; text-align: center; letter-spacing: 1px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #444; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; margin-bottom: 20px; transition: 0.3s; }
        input:focus { border-color: #fbbc04; outline: none; box-shadow: 0 0 0 4px rgba(251,188,4,0.1); }
        .pass-container { position: relative; }
        .pass-toggle { position: absolute; right: 12px; top: 12px; background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 0; }
        button[type="submit"] { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #000; color: #fbbc04; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        button[type="submit"]:hover { background: #333; transform: translateY(-1px); }
        .back-link { position: absolute; top: 20px; left: 20px; text-decoration: none; color: #fbbc04; font-weight: 500; }
        
        @media screen and (max-width: 768px) {
            .login-card { width: 90%; padding: 30px; }
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">&larr; Return</a>

    <div class="login-card">
        <h2>ADMIN MASTER VAULT</h2>
        <form method="POST">
            <label>Master Access Password:</label>
            <div class="pass-container">
                <input type="password" name="password" id="adminPass" required placeholder="••••••••">
                <button type="button" class="pass-toggle" onclick="togglePass()">👁️</button>
            </div>
            <button type="submit">Unlock Admin Panel</button>
        </form>
    </div>

    <script>
        function togglePass() {
            const passInput = document.getElementById('adminPass');
            passInput.type = passInput.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
