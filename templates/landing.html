<!DOCTYPE html>
<html>
<head>
    <title>Welcome to VIP Club</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

            body { padding-top: 30px !important; padding-left: 15px; padding-right: 15px; }
            button { width: 100%; padding: 15px; font-size: 18px; margin: 10px 0 !important; box-sizing: border-box; }

    <a href="/register">

    </a>
    
    <a href="/login">
        <button style="padding: 15px 30px; font-size: 16px; margin: 10px; cursor: pointer; background-color: #008CBA; color: white; border: none; border-radius: 5px;">Member Login</button>

</html>
