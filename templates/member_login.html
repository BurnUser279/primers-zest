<!DOCTYPE html>
<html>

<head>
    <title>Member Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @media screen and (max-width: 768px) {
            body { padding: 15px; font-family: sans-serif; }
            form, input { width: 100%; box-sizing: border-box; }
            button[type="submit"] { padding: 15px; font-size: 18px; width: 100%; margin-top: 10px; }
        }
    </style>
</head>

<body>
    <a href="/" style="display:inline-block; margin-bottom: 20px; text-decoration: none; color: #333; font-weight: bold;">&larr; Back to Landing</a>
    <h2>Club member Portal</h2>
    <form action="/login" method="POST">
        <label>Email Address:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <button type="submit">Login</button>
    </form>
    <p style="margin-top: 20px;">Don't have an account? <a href="/register">Sign up</a></p>
</body>

</html>
