<!DOCTYPE html>
<html>

<head>
    <title>Member Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { margin-top: 0; color: #1a1a1a; text-align: center; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #444; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; margin-bottom: 20px; transition: 0.3s; }
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 0 4px rgba(0,123,255,0.1); }
        .pass-container { position: relative; }
        .pass-toggle { position: absolute; right: 12px; top: 12px; background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 0; }
        button[type="submit"] { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #1a1a1a; color: white; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        button[type="submit"]:hover { background: #333; transform: translateY(-1px); }
        .back-link { position: absolute; top: 20px; left: 20px; text-decoration: none; color: #666; font-weight: 500; }
        
        /* Glassmorphism Flash Messages */
        .flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .flash-modal { background: rgba(255, 255, 255, 0.8); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 90%; }
        .flash-modal p { margin: 0 0 20px 0; color: #333; line-height: 1.6; font-weight: 500; }
        .flash-modal a { color: #007bff; text-decoration: underline; }
        .close-btn { background: #1a1a1a; color: white; padding: 10px 25px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; }

        @media screen and (max-width: 768px) {
            .login-card { width: 90%; padding: 30px; }
        }
    </style>
</head>

<body class="vip-theme">
    <a href="/" class="back-link">&larr; Return</a>



    <div class="login-card">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-overlay" id="flashOverlay">
                <div class="flash-modal">
                    {% for message in messages %}
                      <p>{{ message | safe }}</p>
                    {% endfor %}
                    <button class="close-btn" onclick="document.getElementById('flashOverlay').style.display='none'">Close</button>
                </div>
            </div>
          {% endif %}
        {% endwith %}
        <h2>Club Member Portal</h2>
        <form action="/login" method="POST">
            <label>Email Address:</label>
            <input type="email" name="email" required placeholder="name@example.com">

            <label>Password:</label>
            <div class="pass-container" style="position: relative;">
                <input type="password" name="password" id="member-password" required placeholder="••••••••">
                <span onclick="togglePasswordVisibility('member-password', this)" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;">
                    <svg class="eye-svg" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </span>
            </div>

            <button type="submit">Login to Portal</button>
        </form>
        <p style="margin-top: 25px; text-align: center; color: #666;">Don't have an account? <a href="/register" style="color: #007bff; font-weight: 600; text-decoration: none;">Sign up</a></p>
    </div>

    <script>
        window.togglePasswordVisibility = function(inputId, iconSpan) {
            const input = document.getElementById(inputId);
            const svg = iconSpan.querySelector('svg');
            if (input.type === 'password') {
                input.type = 'text';
                svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = 'password';
                svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        };
    </script>
    <footer style="padding: 40px 20px; border-top: 1px solid #222; color: #555; font-size: 0.9rem; text-align: center; width: 100%;">
        {{ footer_info }}
    </footer>

    <style>
        .vip-theme { background-color: #0a0a0a !important; color: #e0e0e0 !important; }
        .vip-theme .login-card { background: #140505 !important; border: 1px solid #7a0000 !important; }
        .vip-theme h2, .vip-theme label { color: #7a0000 !important; }
        .vip-theme input { background: #1a0808 !important; border-color: #333 !important; color: white !important; }
        .vip-theme button[type="submit"] { background: #7a0000 !important; }
        .vip-theme button[type="submit"]:hover { background: #5e17eb !important; box-shadow: 0 0 15px #5e17eb; }
        .vip-theme .back-link { color: #888 !important; }
        .vip-theme p { color: #888 !important; }
    </style>
</body>

</html>
